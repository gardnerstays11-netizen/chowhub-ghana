openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ChowHub Ghana - Food & Dining Discovery Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: listings
    description: Listing discovery and management
  - name: menu
    description: Menu items
  - name: reservations
    description: Reservations
  - name: orders
    description: Orders
  - name: reviews
    description: Reviews
  - name: saved
    description: Saved places
  - name: vendors
    description: Vendor portal
  - name: admin
    description: Admin portal
  - name: dashboard
    description: Dashboard and analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ──
  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterUserBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me/update:
    patch:
      operationId: updateUserProfile
      tags: [auth]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ── Vendor Auth ──
  /auth/vendor/register:
    post:
      operationId: registerVendor
      tags: [auth]
      summary: Register a new vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterVendorBody"
      responses:
        "201":
          description: Vendor created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorAuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/vendor/login:
    post:
      operationId: loginVendor
      tags: [auth]
      summary: Login vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorAuthResponse"

  /auth/vendor/me:
    get:
      operationId: getCurrentVendor
      tags: [auth]
      summary: Get current vendor
      responses:
        "200":
          description: Current vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  # ── Admin Auth ──
  /auth/admin/login:
    post:
      operationId: loginAdmin
      tags: [auth]
      summary: Login admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  # ── Listings (Public) ──
  /listings:
    get:
      operationId: searchListings
      tags: [listings]
      summary: Search and filter listings
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: cuisine_type
          in: query
          schema:
            type: string
          description: Comma-separated cuisine types
        - name: meal_period
          in: query
          schema:
            type: string
          description: Comma-separated meal periods
        - name: price_range
          in: query
          schema:
            type: string
        - name: dining_style
          in: query
          schema:
            type: string
        - name: city
          in: query
          schema:
            type: string
        - name: area
          in: query
          schema:
            type: string
        - name: features
          in: query
          schema:
            type: string
          description: Comma-separated features
        - name: open_now
          in: query
          schema:
            type: string
            enum: ["true", "false"]
        - name: accepts_reservations
          in: query
          schema:
            type: string
            enum: ["true", "false"]
        - name: accepts_orders
          in: query
          schema:
            type: string
            enum: ["true", "false"]
        - name: min_rating
          in: query
          schema:
            type: number
        - name: sort
          in: query
          schema:
            type: string
            enum: [highest_rated, most_reviewed, newest, featured, price_low, price_high]
        - name: lat
          in: query
          schema:
            type: number
        - name: lng
          in: query
          schema:
            type: number
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingSearchResponse"

  /listings/featured:
    get:
      operationId: getFeaturedListings
      tags: [listings]
      summary: Get featured/premium listings
      responses:
        "200":
          description: Featured listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ListingCard"

  /listings/recent:
    get:
      operationId: getRecentListings
      tags: [listings]
      summary: Get recently added listings
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ListingCard"

  /listings/top-rated:
    get:
      operationId: getTopRatedListings
      tags: [listings]
      summary: Get top rated listings
      parameters:
        - name: city
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Top rated listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ListingCard"

  /listings/nearby:
    get:
      operationId: getNearbyListings
      tags: [listings]
      summary: Get listings near coordinates
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
        - name: lng
          in: query
          required: true
          schema:
            type: number
        - name: radius
          in: query
          schema:
            type: number
            default: 5
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Nearby listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ListingCard"

  /listings/categories-count:
    get:
      operationId: getCategoriesCount
      tags: [dashboard]
      summary: Get listing count per category
      parameters:
        - name: city
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Category counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryCount"

  /listings/cities-count:
    get:
      operationId: getCitiesCount
      tags: [dashboard]
      summary: Get listing count per city
      responses:
        "200":
          description: City counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CityCount"

  /listings/cuisines-count:
    get:
      operationId: getCuisinesCount
      tags: [dashboard]
      summary: Get listing count per cuisine type
      parameters:
        - name: city
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Cuisine counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CuisineCount"

  /listings/{slug}:
    get:
      operationId: getListingBySlug
      tags: [listings]
      summary: Get listing detail by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Listing detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /listings/{listingId}/menu:
    get:
      operationId: getListingMenu
      tags: [menu]
      summary: Get menu items for a listing
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Menu items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuItem"

  /listings/{listingId}/reviews:
    get:
      operationId: getListingReviews
      tags: [reviews]
      summary: Get reviews for a listing
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewsResponse"

    post:
      operationId: createReview
      tags: [reviews]
      summary: Create a review
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewBody"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          description: Already reviewed or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Reservations ──
  /reservations:
    post:
      operationId: createReservation
      tags: [reservations]
      summary: Create a reservation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReservationBody"
      responses:
        "201":
          description: Reservation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"

  /reservations/mine:
    get:
      operationId: getMyReservations
      tags: [reservations]
      summary: Get current user reservations
      responses:
        "200":
          description: User reservations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reservation"

  # ── Orders ──
  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/mine:
    get:
      operationId: getMyOrders
      tags: [orders]
      summary: Get current user orders
      responses:
        "200":
          description: User orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  # ── Saved Places ──
  /saved:
    get:
      operationId: getSavedPlaces
      tags: [saved]
      summary: Get saved places
      responses:
        "200":
          description: Saved places
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedPlace"

  /saved/{listingId}:
    post:
      operationId: saveListing
      tags: [saved]
      summary: Save a listing
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedPlace"

    delete:
      operationId: unsaveListing
      tags: [saved]
      summary: Unsave a listing
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Unsaved

  # ── User Reviews ──
  /reviews/mine:
    get:
      operationId: getMyReviews
      tags: [reviews]
      summary: Get current user reviews
      responses:
        "200":
          description: User reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

  # ── Vendor Portal ──
  /vendor/listing:
    get:
      operationId: getVendorListing
      tags: [vendors]
      summary: Get vendor's listing
      responses:
        "200":
          description: Vendor listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingDetail"
        "404":
          description: No listing yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: createVendorListing
      tags: [vendors]
      summary: Create vendor listing (onboarding)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateListingBody"
      responses:
        "201":
          description: Listing created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingDetail"

    patch:
      operationId: updateVendorListing
      tags: [vendors]
      summary: Update vendor listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateListingBody"
      responses:
        "200":
          description: Listing updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingDetail"

  /vendor/photos:
    get:
      operationId: getVendorPhotos
      tags: [vendors]
      summary: Get vendor listing photos
      responses:
        "200":
          description: Photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ListingPhoto"

    post:
      operationId: addVendorPhoto
      tags: [vendors]
      summary: Add photo to listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPhotoBody"
      responses:
        "201":
          description: Photo added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingPhoto"

  /vendor/photos/{photoId}:
    delete:
      operationId: deleteVendorPhoto
      tags: [vendors]
      summary: Delete a photo
      parameters:
        - name: photoId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /vendor/menu:
    get:
      operationId: getVendorMenu
      tags: [vendors]
      summary: Get vendor menu items
      responses:
        "200":
          description: Menu items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuItem"

    post:
      operationId: addVendorMenuItem
      tags: [vendors]
      summary: Add menu item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMenuItemBody"
      responses:
        "201":
          description: Menu item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"

  /vendor/menu/{itemId}:
    patch:
      operationId: updateVendorMenuItem
      tags: [vendors]
      summary: Update menu item
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMenuItemBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"

    delete:
      operationId: deleteVendorMenuItem
      tags: [vendors]
      summary: Delete menu item
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /vendor/reservations:
    get:
      operationId: getVendorReservations
      tags: [vendors]
      summary: Get vendor reservations
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Reservations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reservation"

  /vendor/reservations/{reservationId}/status:
    patch:
      operationId: updateReservationStatus
      tags: [vendors]
      summary: Confirm or decline reservation
      parameters:
        - name: reservationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStatusBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"

  /vendor/orders:
    get:
      operationId: getVendorOrders
      tags: [vendors]
      summary: Get vendor orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /vendor/orders/{orderId}/status:
    patch:
      operationId: updateOrderStatus
      tags: [vendors]
      summary: Update order status
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /vendor/reviews:
    get:
      operationId: getVendorReviews
      tags: [vendors]
      summary: Get reviews for vendor listing
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

  /vendor/stats:
    get:
      operationId: getVendorStats
      tags: [vendors]
      summary: Get vendor dashboard stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorStats"

  # ── Admin Portal ──
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get platform-wide stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/vendors:
    get:
      operationId: getAdminVendors
      tags: [admin]
      summary: Get all vendors
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Vendors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"

  /admin/vendors/{vendorId}/approve:
    patch:
      operationId: approveVendor
      tags: [admin]
      summary: Approve a vendor
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /admin/vendors/{vendorId}/reject:
    patch:
      operationId: rejectVendor
      tags: [admin]
      summary: Reject a vendor
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /admin/vendors/{vendorId}/plan:
    patch:
      operationId: updateVendorPlan
      tags: [admin]
      summary: Set vendor plan
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVendorPlanBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /admin/listings:
    get:
      operationId: getAdminListings
      tags: [admin]
      summary: Get all listings (admin)
      parameters:
        - name: city
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ListingCard"

  /admin/listings/{listingId}/feature:
    patch:
      operationId: toggleListingFeatured
      tags: [admin]
      summary: Toggle listing featured status
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingCard"

  /admin/listings/{listingId}/status:
    patch:
      operationId: updateListingStatus
      tags: [admin]
      summary: Update listing status
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateListingStatusBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingCard"

  /admin/users:
    get:
      operationId: getAdminUsers
      tags: [admin]
      summary: Get all users
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /admin/reviews:
    get:
      operationId: getAdminReviews
      tags: [admin]
      summary: Get all reviews (admin)
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

  /admin/reviews/{reviewId}:
    delete:
      operationId: deleteReview
      tags: [admin]
      summary: Delete inappropriate review
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

